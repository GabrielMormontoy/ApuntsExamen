<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple and Visually Appealing Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background: #007BFF;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background: #007BFF;
            color: white;
            position: absolute;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Simple Website</h1>
    </header>
    <main>
        <h2>This is a simple website</h2>
        <p>Created using HTML, CSS, and JavaScript.</p>
        <button onclick="displayDate()">Click me to display the date</button>
        <p id="dateDisplay"></p>
    </main>
    <footer>
        <p>&copy; 2026 Gabriel Mormontoy</p>
    </footer>
    <script>
        function displayDate() {
            document.getElementById('dateDisplay').innerHTML = new Date().toLocaleString();
        }
    </script>
</body>
</html>

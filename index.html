<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: white;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #2c3e50;
            letter-spacing: -0.5px;
        }
        
        main {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        h2 {
            font-size: 22px;
            margin-bottom: 12px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #555;
        }
        
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3);
        }
        
        button:hover {
            background-color: #2980b9;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #dateDisplay {
            margin-top: 20px;
            padding: 16px;
            background: #ecf0f1;
            border-radius: 6px;
            font-size: 14px;
            color: #555;
            text-align: center;
            min-height: 24px;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 14px;
            border-top: 1px solid #ecf0f1;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome</h1>
    </header>
    
    <main>
        <div class="container">
            <h2>Thank you for visiting</h2>
            <p>This is a clean, modern website built with HTML, CSS, and JavaScript. Feel free to explore and enjoy your stay.</p>
            <button onclick="displayDate()">Show Current Date & Time</button>
            <div id="dateDisplay"></div>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2026 Gabriel Mormontoy. All rights reserved.</p>
    </footer>
    
    <script>
        function displayDate() {
            const now = new Date();
            document.getElementById('dateDisplay').innerHTML = now.toLocaleString();
        }
    </script>
</body>
</html>
